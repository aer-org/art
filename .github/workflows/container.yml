name: Container Image

on:
  push:
    branches: [main, dev]
    paths:
      - 'container/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aer-org/art-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./container
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Export image as tar
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest | gzip > art-agent.tar.gz

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: container-latest
          name: Container Image (latest)
          body: "Auto-built container image tar for udocker. Load with: `udocker load -i art-agent.tar.gz`"
          files: art-agent.tar.gz
          make_latest: false
