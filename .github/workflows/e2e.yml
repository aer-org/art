name: E2E Tests

on:
  pull_request:
    branches: [main, dev]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Docker image layer cache
      - uses: actions/cache@v4
        with:
          path: /tmp/art-agent-image.tar
          key: art-agent-${{ hashFiles('container/**') }}

      - name: Load or build container image
        run: |
          if [ -f /tmp/art-agent-image.tar ]; then
            docker load < /tmp/art-agent-image.tar
          else
            ./container/build.sh
            docker save art-agent:latest > /tmp/art-agent-image.tar
          fi

      # Claude CLI (needed for agent-mode preflight)
      - run: npm install -g @anthropic-ai/claude-code

      - run: npm run test:e2e
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONTAINER_RUNTIME: docker
          CI: true
