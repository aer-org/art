name: E2E Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch: {}

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run build

      # Docker image layer cache
      - uses: actions/cache@v5
        with:
          path: /tmp/art-agent-image.tar
          key: art-agent-${{ hashFiles('container/**') }}

      - name: Load or build container image
        run: |
          if [ -f /tmp/art-agent-image.tar ]; then
            docker load < /tmp/art-agent-image.tar
          else
            ./container/build.sh
            docker save art-agent:latest > /tmp/art-agent-image.tar
          fi

      # Claude CLI (needed for agent-mode preflight)
      - run: npm install -g @anthropic-ai/claude-code

      - run: npm run test:e2e
        env:
          # Only inject token on push/dispatch — PRs run command-mode tests only.
          # This is intentional: PR workflows from forks cannot safely access secrets
          # without risk of exfiltration. Agent-mode is validated on push to main/dev.
          ANTHROPIC_API_KEY: ${{ (github.event_name != 'pull_request') && secrets.ANTHROPIC_API_KEY || '' }}
          CONTAINER_RUNTIME: docker
          CI: true
